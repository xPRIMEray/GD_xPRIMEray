site_name: GD_xPRIMEray
site_description: Curved Ray Transport Engine for GRIN Fields (Godot 4.x) — hybrid symbolic–numeric propagation
site_author: AetherTopologist

repo_name: AetherTopologist/GD_xPRIMEray
repo_url: https://github.com/AetherTopologist/GD_xPRIMEray
edit_uri: edit/main/Docs/

docs_dir: Docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md

  - Core Docs:
      - System Architecture: architecture.md
      - Architecture Overview: architecture_overview.md
      - Architecture Review: architecture_review_ray_renderer.md
      - Code Map (Big 12): code_map_big12.md
      - Validation Framework: validation.md
      - Specification Index: SPEC_INDEX.md
      - Architecture Charter (Current): _xPRIMEray_arch_charter_v3-ChatClaudeGrokCoherencePass2.md

  - Physics and Transport:
      - Metric Parameter Map: metric_null_geodesic_param_map.md
      - Metric Transport Roadmap: metric_transport_nextgen_roadmap.md
      - BlackHole Fast Compare: blackhole_fast_compare.md
      - Property Surface: PropertySurface.md
      - RenderStep Gate Hierarchy: RenderStep_GateHierarchy.md

  - Specifications — Current / Revised:
      - SceneSnapshot Data Layout (Revised): spec_scene_snapshot_data_layout_1.md
      - Field System GRIN (Revised): spec_field_system_grin_1.md
      - FieldSource3D Canonical Params: spec_fieldsource3d_canonical_params_1.md
      - Metric Models (Revised): spec_metric_models_grin_vs_gordon_1.md
      - Field Extraction Rules (Revised): spec_field_extraction_rules_1.md
      - Curved Ray Segment Integration (Revised): spec_curved_ray_chunks_1.md
      - BVH Acceleration (Revised): spec_bvh_acceleration_1.md
      - Scheduler and Task Graph (Revised): spec_scheduler_task_graph_1.md
      - Rendering Backends: spec_rendering_backends_1.md
      - Telemetry / Debug / Diagnostics: spec_telemetry_debug_1.md
      - Ray Transport Interfaces: spec_ray_transport_interfaces_1.md
      - Research Mode: spec_research_mode_1.md
      - Wormhole Multi-Scene System: spec_wormhole_scene_graph_1.md

  - Specifications — Legacy Baselines:
      - SceneSnapshot Data Layout (Legacy): spec_scene_snapshot_data_layout.md
      - Field System GRIN (Legacy): spec_field_system_grin.md
      - Metric Models (Legacy): spec_metric_models_grin_vs_gordon.md
      - Field Extraction Rules (Legacy): spec_field_extraction_rules.md
      - Curved Ray Chunk Integration (Legacy): spec_curved_ray_chunks.md
      - BVH Acceleration (Legacy): spec_bvh_acceleration.md
      - Scheduler and Task Graph (Legacy): spec_scheduler_task_graph.md

  - Calibration Roadmap:
      - C1.0 g.1 — Parse / export canonical signature fields: CalibRoadmap/PatchLogs/C1_0_g_1.md
      - C1.7 g.X — AutoCal weak-signal stopgap: CalibRoadmap/PatchLogs/C1_7_g_X.md

  - Archive:
      - Master Outline v0: _Archive/_arch_charter_MASTER_v0-Chat52.md
      - Master Outline v1 Alt RESEARCHMODE: _Archive/_arch_charter_MASTER_v1-Alt-RESEARCHMODE.md
      - Master Outline v1 Alt Other Updated: _Archive/_arch_charter_MASTER_v1-Alt-otherUpdated.md
      - Master Outline v1 Baseline Gravity: _Archive/_arch_charter_MASTER_v1-Baseline-Gravity.md
      - Master Outline v2: _Archive/_arch_charter_MASTER_v2-Chat52.md
      - Charter Master v3 Coherence Pass 1: _Archive/_xPRIMEray_arch_charter_MASTER_v3-ChatClaudeCoherencePass1.md
      - Charter v2 Claude45: _Archive/_xPRIMEray_arch_charter_v2-Claude45.md
      - Charter v2 Claude46: _Archive/_xPRIMEray_arch_charter_v2-Claude46.md
