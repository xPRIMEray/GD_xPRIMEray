site_name: GD_xPRIMEray
site_description: Curved Ray Transport Engine for GRIN Fields (Godot 4.x) — hybrid symbolic–numeric propagation.
site_author: AetherTopologist
repo_name: AetherTopologist/GD_xPRIMEray
repo_url: https://github.com/AetherTopologist/GD_xPRIMEray
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

# Mermaid diagrams in markdown (```mermaid)
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Core:
      - Architecture: architecture.md
      - Transport Model: transport_model.md
      - Integrators: integrators.md
  - Verification:
      - Validation: validation.md
  - Project:
      - Roadmap: roadmap.md