<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!--
    xPRIMEray Icon — Construction per spec
    Unit square: 0 0 1000 1000 | Center: 500,500
    Sphere: r=400 | X: clipped 50px gap at center | Ray: Q 500,747 (golden-ratio offset)
  -->
  <defs>
    <radialGradient id="i-sphere" cx="40%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#1a1d38"/>
      <stop offset="55%" stop-color="#07080f"/>
      <stop offset="100%" stop-color="#000002"/>
    </radialGradient>
    <radialGradient id="i-field" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4455ee" stop-opacity="0.09"/>
      <stop offset="65%" stop-color="#4455ee" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="i-gloss" cx="33%" cy="28%" r="42%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="i-clip">
      <circle cx="500" cy="500" r="396"/>
    </clipPath>
  </defs>

  <!-- Sphere body -->
  <circle cx="500" cy="500" r="400" fill="url(#i-sphere)"/>
  <circle cx="500" cy="500" r="400" fill="url(#i-field)"/>
  <circle cx="500" cy="500" r="400" fill="url(#i-gloss)"/>

  <!-- Internal field arcs (subtle) -->
  <g clip-path="url(#i-clip)" fill="none" stroke="#5566cc" stroke-width="1.5" opacity="0.07">
    <circle cx="500" cy="500" r="140"/>
    <circle cx="500" cy="500" r="245"/>
    <circle cx="500" cy="500" r="335"/>
  </g>

  <!-- X — four arms, 100px gap at center -->
  <line x1="200" y1="200" x2="450" y2="450" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <line x1="550" y1="550" x2="800" y2="800" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <line x1="200" y1="800" x2="450" y2="550" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <line x1="550" y1="450" x2="800" y2="200" stroke="white" stroke-width="20" stroke-linecap="round"/>

  <!-- Ray — chromatic halo (boundary signature) -->
  <path d="M 100,452 Q 500,749 900,552"
        fill="none" stroke="#ff4422" stroke-width="9" stroke-linecap="round" opacity="0.28"/>
  <path d="M 100,448 Q 500,745 900,548"
        fill="none" stroke="#3366ff" stroke-width="9" stroke-linecap="round" opacity="0.28"/>

  <!-- Ray — white core  (P0→Q P2→P3, k=R/φ≈247) -->
  <path d="M 100,450 Q 500,747 900,550"
        fill="none" stroke="white" stroke-width="13" stroke-linecap="round"/>

  <!-- Arrowhead — tangent at t=1: dir(400,−197) norm≈(0.897,−0.442), perp(0.442,0.897) -->
  <polygon points="900,550 878,574 868,551" fill="white"/>

  <!-- Prime mark ′ — short tick at exit, ~20° off ray tangent -->
  <line x1="916" y1="533" x2="929" y2="510" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.88"/>

  <!-- Sphere chromatic rim -->
  <circle cx="500" cy="500" r="403" fill="none" stroke="#ff5533" stroke-width="3" opacity="0.22"/>
  <circle cx="500" cy="500" r="397" fill="none" stroke="#3355ee" stroke-width="3" opacity="0.22"/>

  <!-- Sphere ring -->
  <circle cx="500" cy="500" r="400" fill="none" stroke="white" stroke-width="8"/>

  <!-- Equatorial ring (instrument line) -->
  <ellipse cx="500" cy="500" rx="400" ry="84" fill="none" stroke="white" stroke-width="2" opacity="0.18"/>
</svg>
